{% extends "base.html" %}

{% block title %}Name the share{% endblock %}

{% block content %}
  <p class="lead">
    This is the name Windows will show when you connect to the shared folder.
  </p>
  <form method="post" action="/share-name">
    <label class="field">
      <span>Share name</span>
      <input
        type="text"
        name="share_name"
        value="{{ state.share_name or 'Backups' }}"
        autocomplete="off"
        required
      >
    </label>
    <p class="hint">Example: Backups, FamilyPhotos, SharedFiles</p>
    <div class="actions split">
      <a href="/drive-selection" class="secondary">Back</a>
      <button type="submit">Continue</button>
    </div>
  </form>
{% endblock %}
